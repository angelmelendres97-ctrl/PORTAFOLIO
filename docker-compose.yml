version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agxport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agxport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend2
      dockerfile: Dockerfile
    container_name: agxport-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      JWT_SECRET: your-secret-key-change-in-production
      JWT_EXPIRES_IN: 2h
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme123
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: agxport
      PGUSER: postgres
      PGPASSWORD: postgres
    ports:
      - "4000:4000"
    volumes:
      - ./Backend2:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agxport-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
