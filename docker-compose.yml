services:
  backend:
    build:
      context: ./backend
    container_name: agx_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: agx_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
